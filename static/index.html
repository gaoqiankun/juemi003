<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050816">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3CradialGradient id='g' cx='28%25' cy='28%25' r='76%25'%3E%3Cstop offset='0%25' stop-color='%23fff7ed'/%3E%3Cstop offset='35%25' stop-color='%23f97316'/%3E%3Cstop offset='100%25' stop-color='%23fb7185'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='14' fill='%23040712'/%3E%3Cpath d='M12 31 24 12l12 19-12 5z' fill='url(%23g)'/%3E%3C/svg%3E">
  <title>gen3d Studio</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.11"></script>
  <script type="importmap">
    {
      "imports": {
        "lucide": "https://esm.sh/lucide@0.477.0?bundle",
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --bg-soft: #0d1223;
      --surface: rgba(10, 16, 31, 0.86);
      --surface-strong: rgba(9, 14, 27, 0.96);
      --surface-muted: rgba(17, 24, 39, 0.78);
      --border: rgba(255, 255, 255, 0.1);
      --border-strong: rgba(251, 146, 60, 0.28);
      --text: #eff6ff;
      --muted: #95a3be;
      --brand: #f97316;
      --brand-2: #fb7185;
      --success: #34d399;
      --error: #fb7185;
      --warning: #f59e0b;
      --shadow: 0 32px 80px rgba(2, 8, 23, 0.52);
      --shadow-soft: 0 22px 50px rgba(2, 8, 23, 0.28);
      --grid: rgba(255, 255, 255, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(249, 115, 22, 0.22), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(251, 113, 133, 0.16), transparent 26%),
        radial-gradient(circle at 18% 84%, rgba(56, 189, 248, 0.12), transparent 20%),
        linear-gradient(180deg, #040712 0%, #070b16 42%, #050816 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 140px 140px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.72), transparent 82%);
      opacity: 0.2;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(5, 8, 22, 0.1), rgba(5, 8, 22, 0.55));
      pointer-events: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    [hidden] {
      display: none !important;
    }

    .glass-panel {
      background: linear-gradient(180deg, rgba(10, 16, 31, 0.9), rgba(10, 16, 31, 0.74));
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .glass-panel-strong {
      background: linear-gradient(180deg, rgba(8, 13, 27, 0.98), rgba(10, 16, 31, 0.94));
      border: 1px solid rgba(249, 115, 22, 0.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .brand-halo {
      position: relative;
      isolation: isolate;
    }

    .brand-halo::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.74), rgba(251, 113, 133, 0.5), rgba(56, 189, 248, 0.18));
      filter: blur(18px);
      opacity: 0.5;
      z-index: -1;
    }

    .header-shell {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(4, 7, 18, 0.82), rgba(4, 7, 18, 0.58));
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid transparent;
      color: var(--muted);
      transition: color 180ms ease, border-color 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .nav-link:hover,
    .nav-link:focus-visible {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
    }

    .nav-link.is-active {
      color: var(--text);
      border-color: rgba(249, 115, 22, 0.32);
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.16), rgba(251, 113, 133, 0.08));
      box-shadow: inset 0 0 0 1px rgba(249, 115, 22, 0.16);
    }

    .pill-button {
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .pill-button:hover:not(:disabled),
    .pill-button:focus-visible:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.2);
      outline: none;
    }

    .pill-button:disabled,
    .ghost-button:disabled,
    .card-action:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
      box-shadow: none;
    }

    .ghost-button,
    .card-action {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .ghost-button:hover:not(:disabled),
    .card-action:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
    }

    .card-action.danger {
      border-color: rgba(251, 113, 133, 0.24);
      color: #fecdd3;
      background: rgba(251, 113, 133, 0.1);
    }

    .card-action.danger:hover:not(:disabled) {
      border-color: rgba(251, 113, 133, 0.34);
      background: rgba(251, 113, 133, 0.16);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
    }

    .status-dot.ready,
    .status-dot.success {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.14), 0 0 18px rgba(52, 211, 153, 0.46);
    }

    .status-dot.error,
    .status-dot.empty {
      background: var(--error);
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.12), 0 0 18px rgba(251, 113, 133, 0.32);
    }

    .status-dot.pending {
      background: var(--warning);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.12), 0 0 18px rgba(245, 158, 11, 0.32);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 1px solid transparent;
    }

    .status-badge svg {
      width: 16px;
      height: 16px;
    }

    .status-badge.queued {
      color: #fcd34d;
      border-color: rgba(245, 158, 11, 0.24);
      background: rgba(245, 158, 11, 0.12);
    }

    .status-badge.processing {
      color: #7dd3fc;
      border-color: rgba(56, 189, 248, 0.24);
      background: rgba(56, 189, 248, 0.1);
    }

    .status-badge.done {
      color: #86efac;
      border-color: rgba(52, 211, 153, 0.22);
      background: rgba(52, 211, 153, 0.1);
    }

    .status-badge.failed {
      color: #fecdd3;
      border-color: rgba(251, 113, 133, 0.24);
      background: rgba(251, 113, 133, 0.1);
    }

    .status-badge.processing svg,
    .spin-icon {
      animation: spin 1s linear infinite;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(249, 115, 22, 0.9), rgba(251, 113, 133, 0.95));
      box-shadow: 0 0 24px rgba(249, 115, 22, 0.34);
      transition: width 220ms ease;
    }

    .dropzone {
      position: relative;
      overflow: hidden;
      border: 1px dashed rgba(251, 146, 60, 0.34);
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.84), rgba(12, 18, 35, 0.96)),
        radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 42%);
      transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .dropzone::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.14), transparent 40%, rgba(251, 113, 133, 0.12));
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .dropzone:hover,
    .dropzone:focus-within,
    .dropzone.dragover {
      transform: translateY(-2px);
      border-color: rgba(249, 115, 22, 0.64);
      box-shadow: 0 24px 44px rgba(249, 115, 22, 0.12);
    }

    .dropzone:hover::after,
    .dropzone:focus-within::after,
    .dropzone.dragover::after {
      opacity: 1;
    }

    .thumbnail-frame {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 38%),
        linear-gradient(180deg, rgba(12, 18, 35, 0.96), rgba(8, 12, 24, 0.98));
      aspect-ratio: 1.28 / 1;
    }

    .thumbnail-frame img,
    .thumbnail-frame canvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .thumbnail-overlay {
      position: absolute;
      inset: auto 0 0 0;
      padding: 14px;
      background: linear-gradient(180deg, transparent, rgba(4, 8, 18, 0.88));
      color: var(--muted);
      font-size: 0.78rem;
    }

    .thumbnail-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(239, 246, 255, 0.82);
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.12), transparent 24%);
    }

    .task-card {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .task-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at top right, rgba(249, 115, 22, 0.18), transparent 34%);
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .task-card:hover,
    .task-card:focus-visible,
    .task-card.is-selected {
      transform: translateY(-3px);
      border-color: rgba(249, 115, 22, 0.28);
      box-shadow: 0 26px 48px rgba(2, 8, 23, 0.42);
      outline: none;
    }

    .task-card:hover::before,
    .task-card:focus-visible::before,
    .task-card.is-selected::before {
      opacity: 1;
    }

    .filter-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      transition: all 180ms ease;
    }

    .filter-pill.is-active {
      color: var(--text);
      border-color: rgba(249, 115, 22, 0.28);
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.16), rgba(251, 113, 133, 0.08));
      box-shadow: inset 0 0 0 1px rgba(249, 115, 22, 0.16);
    }

    .meta-card {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .muted-label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .log-feed {
      display: grid;
      gap: 10px;
      max-height: 340px;
      overflow: auto;
      padding-right: 4px;
    }

    .log-item {
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      padding: 14px 16px;
    }

    .viewer-stage {
      position: relative;
      min-height: 420px;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.16), transparent 32%),
        linear-gradient(180deg, rgba(8, 12, 24, 0.98), rgba(5, 8, 22, 0.98));
    }

    .viewer-3d-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .viewer-3d-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(5, 8, 22, 0.26), rgba(5, 8, 22, 0.56));
      color: rgba(239, 246, 255, 0.88);
      text-align: center;
      padding: 24px;
      transition: opacity 180ms ease;
    }

    .viewer-3d-message {
      max-width: 260px;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .viewer-3d-overlay[data-tone="loading"] .viewer-3d-message::before {
      content: "";
      display: block;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-top-color: rgba(249, 115, 22, 0.9);
      margin: 0 auto 14px;
      animation: spin 0.8s linear infinite;
    }

    .viewer-3d-overlay[data-tone="error"] {
      background: linear-gradient(180deg, rgba(127, 29, 29, 0.26), rgba(69, 10, 10, 0.72));
      color: #fecdd3;
    }

    .drawer-backdrop,
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(2, 6, 23, 0.68);
      backdrop-filter: blur(14px);
    }

    .drawer-panel {
      width: min(560px, 100vw);
      height: 100vh;
      margin-left: auto;
      transform: translateX(0);
    }

    .drawer-surface,
    .modal-surface {
      height: 100%;
      background: linear-gradient(180deg, rgba(8, 13, 27, 0.98), rgba(10, 16, 31, 0.95));
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: -24px 0 48px rgba(2, 8, 23, 0.36);
    }

    .drawer-scroll,
    .modal-scroll {
      max-height: 100%;
      overflow: auto;
      padding: 24px;
    }

    .toast-stack {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 90;
      display: grid;
      gap: 12px;
      width: min(360px, calc(100vw - 32px));
    }

    .toast {
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 16px;
      backdrop-filter: blur(18px);
      box-shadow: 0 22px 48px rgba(2, 8, 23, 0.32);
      animation: toast-in 220ms ease;
    }

    .toast.success {
      background: rgba(6, 78, 59, 0.92);
      border-color: rgba(52, 211, 153, 0.26);
    }

    .toast.error {
      background: rgba(127, 29, 29, 0.92);
      border-color: rgba(251, 113, 133, 0.28);
    }

    .toast.info {
      background: rgba(15, 23, 42, 0.94);
      border-color: rgba(96, 165, 250, 0.22);
    }

    .toast-title {
      font-weight: 700;
      font-size: 0.94rem;
      color: white;
    }

    .toast-copy {
      margin-top: 4px;
      font-size: 0.86rem;
      color: rgba(226, 232, 240, 0.88);
      line-height: 1.5;
    }

    .inline-spinner {
      display: inline-flex;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-top-color: currentColor;
      animation: spin 0.8s linear infinite;
    }

    .empty-state {
      border-radius: 28px;
      border: 1px dashed rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
    }

    .form-status {
      min-height: 24px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .form-status.success {
      color: #86efac;
    }

    .form-status.error {
      color: #fecdd3;
    }

    .form-status.info {
      color: #93c5fd;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 1024px) {
      .drawer-panel {
        width: min(100vw, 680px);
      }
    }

    @media (max-width: 768px) {
      .drawer-panel {
        width: 100vw;
      }

      .drawer-scroll,
      .modal-scroll {
        padding: 18px;
      }

      .viewer-stage {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div id="app-shell" class="relative z-10 min-h-screen">
    <header class="header-shell">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 md:px-6">
        <a href="#/" class="brand-halo inline-flex items-center gap-3 rounded-full border border-white/10 bg-white/4 px-3 py-2">
          <span class="flex h-11 w-11 items-center justify-center rounded-full bg-[linear-gradient(135deg,#f97316,#fb7185)] text-slate-950 shadow-[0_10px_30px_rgba(249,115,22,0.28)]">
            <i data-lucide="layers-3" class="h-5 w-5"></i>
          </span>
          <span>
            <span class="block text-sm font-semibold tracking-[0.24em] text-slate-300">gen3d</span>
            <span class="block text-[13px] text-slate-400">Studio Control Surface</span>
          </span>
        </a>
        <div class="flex flex-1 items-center justify-end gap-3 md:gap-4">
          <nav class="hidden items-center gap-2 md:flex" aria-label="主导航">
            <a class="nav-link" data-nav-path="/" href="#/">
              <i data-lucide="sparkles" class="h-4 w-4"></i>
              生成
            </a>
            <a class="nav-link" data-nav-path="/gallery" href="#/gallery">
              <i data-lucide="gallery-horizontal-end" class="h-4 w-4"></i>
              图库
            </a>
            <a class="nav-link" data-nav-path="/settings" href="#/settings">
              <i data-lucide="sliders-horizontal" class="h-4 w-4"></i>
              设置
            </a>
          </nav>
          <div class="glass-panel hidden items-center gap-3 rounded-full px-3 py-2 sm:flex">
            <span id="connection-dot" class="status-dot error"></span>
            <div class="text-right">
              <div id="connection-label" class="text-sm font-medium text-white">连接未检测</div>
              <div id="connection-caption" class="text-xs text-slate-400">等待 /ready 测试</div>
            </div>
          </div>
          <button id="mobile-nav-button" type="button" class="pill-button ghost-button inline-flex h-11 w-11 items-center justify-center rounded-full md:hidden" aria-expanded="false" aria-controls="mobile-nav-panel">
            <i data-lucide="menu" class="h-5 w-5"></i>
          </button>
        </div>
      </div>
      <div id="mobile-nav-panel" class="mx-4 mb-4 hidden rounded-[28px] border border-white/10 bg-[rgba(8,13,27,0.94)] p-2 md:hidden">
        <nav class="grid gap-2" aria-label="移动主导航">
          <a class="nav-link" data-nav-path="/" href="#/">
            <i data-lucide="sparkles" class="h-4 w-4"></i>
            生成
          </a>
          <a class="nav-link" data-nav-path="/gallery" href="#/gallery">
            <i data-lucide="gallery-horizontal-end" class="h-4 w-4"></i>
            图库
          </a>
          <a class="nav-link" data-nav-path="/settings" href="#/settings">
            <i data-lucide="sliders-horizontal" class="h-4 w-4"></i>
            设置
          </a>
        </nav>
      </div>
    </header>

    <main id="route-content" class="mx-auto max-w-7xl px-4 pb-20 pt-6 md:px-6 md:pt-8"></main>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop" hidden>
    <aside class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
      <div id="drawer-surface" class="drawer-surface">
        <div id="drawer-scroll" class="drawer-scroll"></div>
      </div>
    </aside>
  </div>

  <div id="confirm-modal" class="modal-backdrop" hidden>
    <div class="flex min-h-full items-center justify-center p-4">
      <div id="confirm-surface" class="modal-surface glass-panel-strong h-auto w-full max-w-md rounded-[30px] border border-white/10 p-5 shadow-[0_26px_80px_rgba(2,8,23,0.56)] md:p-6" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <p class="muted-label">确认操作</p>
        <h2 id="confirm-title" class="mt-2 text-xl font-semibold tracking-[-0.03em] text-white">确认继续？</h2>
        <p id="confirm-copy" class="mt-3 text-sm leading-6 text-slate-400"></p>
        <div class="mt-6 flex flex-wrap justify-end gap-3">
          <button id="confirm-cancel-button" type="button" class="pill-button ghost-button rounded-full px-4 py-2.5 text-sm font-medium text-slate-200">
            取消
          </button>
          <button id="confirm-accept-button" type="button" class="pill-button rounded-full bg-rose-500 px-4 py-2.5 text-sm font-semibold text-white">
            确认
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="/static/router.js"></script>
</body>
</html>
