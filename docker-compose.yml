version: "2.4"

services:
  hey3d-gen3d:
    image: ${HEY3D_IMAGE:-hey3d-gen3d:local}
    container_name: hey3d-gen3d
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        FLASHATTN_DEVEL_IMAGE: ${FLASHATTN_DEVEL_IMAGE:-hey3d/flashattn-devel:latest}
        FLASHATTN_RUNTIME_IMAGE: ${FLASHATTN_RUNTIME_IMAGE:-hey3d/flashattn-runtime:latest}
        TRELLIS2_REPO_URL: ${TRELLIS2_REPO_URL:-https://github.com/microsoft/TRELLIS.2.git}
        TRELLIS2_REF: ${TRELLIS2_REF:-main}
        TORCH_CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-8.0;8.6;8.9;9.0}
    runtime: ${DOCKER_RUNTIME:-nvidia}
    ports:
      - "18001:18001"
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-token}
      PROVIDER_MODE: ${PROVIDER_MODE:-real}
      MODEL_PROVIDER: trellis2
      MODEL_PATH: ${MODEL_PATH:-microsoft/TRELLIS.2-4B}
      HF_HOME: /data/huggingface
      ARTIFACT_STORE_MODE: ${ARTIFACT_STORE_MODE:-local}
      DATABASE_PATH: /data/gen3d.sqlite3
      ARTIFACTS_DIR: /data/artifacts
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-}
      OBJECT_STORE_EXTERNAL_ENDPOINT: ${OBJECT_STORE_EXTERNAL_ENDPOINT:-}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-gen3d-artifacts}
      OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
      OBJECT_STORE_REGION: ${OBJECT_STORE_REGION:-us-east-1}
      OBJECT_STORE_PREFIX: ${OBJECT_STORE_PREFIX:-artifacts}
      OBJECT_STORE_PRESIGN_TTL_SECONDS: ${OBJECT_STORE_PRESIGN_TTL_SECONDS:-3600}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ${GEN3D_DATA_DIR:-./data}:/data
      - ${GEN3D_MODEL_DIR:-./models/trellis2}:/models/trellis2:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${GEN3D_MINIO_DIR:-./.minio}:/data
    profiles:
      - minio

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 ${OBJECT_STORE_ACCESS_KEY:-minioadmin} ${OBJECT_STORE_SECRET_KEY:-minioadmin}; do
          sleep 1;
        done &&
        mc mb --ignore-existing local/${OBJECT_STORE_BUCKET:-gen3d-artifacts}
    profiles:
      - minio
