name: cubie3d

services:
  cubie3d:
    image: ${IMAGE:-cubie3d:local}
    container_name: cubie3d
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        TRELLIS2_IMAGE: ${TRELLIS2_IMAGE:-cubie3d/trellis2:latest}
    runtime: ${DOCKER_RUNTIME:-nvidia}
    ports:
      - "18001:18001"
    environment:
      # ADMIN_TOKEN only protects /admin/privileged-keys bootstrap endpoints.
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      PROVIDER_MODE: ${PROVIDER_MODE:-real}
      HOME: /data/home
      HF_HOME: ${HF_HOME:-/data/huggingface}
      XDG_CACHE_HOME: /data/.cache
      TRITON_CACHE_DIR: /data/.triton
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      ARTIFACT_STORE_MODE: ${ARTIFACT_STORE_MODE:-local}
      DATABASE_PATH: /data/app.sqlite3
      ARTIFACTS_DIR: /data/artifacts
      UPLOADS_DIR: /data/uploads
      MODEL_CACHE_DIR: ${MODEL_CACHE_DIR:-/data/models}
      OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT:-}
      OBJECT_STORE_EXTERNAL_ENDPOINT: ${OBJECT_STORE_EXTERNAL_ENDPOINT:-}
      OBJECT_STORE_BUCKET: ${OBJECT_STORE_BUCKET:-artifacts}
      OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
      OBJECT_STORE_REGION: ${OBJECT_STORE_REGION:-us-east-1}
      OBJECT_STORE_PREFIX: ${OBJECT_STORE_PREFIX:-artifacts}
      OBJECT_STORE_PRESIGN_TTL_SECONDS: ${OBJECT_STORE_PRESIGN_TTL_SECONDS:-3600}
      ALLOWED_CALLBACK_DOMAINS: ${ALLOWED_CALLBACK_DOMAINS:-}
      RATE_LIMIT_CONCURRENT: ${RATE_LIMIT_CONCURRENT:-5}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-100}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ${DATA_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles:
      - minio

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 ${OBJECT_STORE_ACCESS_KEY:-minioadmin} ${OBJECT_STORE_SECRET_KEY:-minioadmin}; do
          sleep 1;
        done &&
        mc mb --ignore-existing local/${OBJECT_STORE_BUCKET:-artifacts}
    profiles:
      - minio
